services:
  devenv:
    build:
      context: ../img-ubuntu-devenv
    container_name: devenv
    hostname: devenv
    stdin_open: true
    tty: true
    environment:
      OLLAMA_HOST: http://ollama:11434
    depends_on:
      - ollama
    volumes:
      - ../img-ubuntu-devenv:/workspace/img-ubuntu-devenv
      - home_dev:/home/dev

  ollama:
    image: ollama/ollama
    container_name: ollama
    hostname: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      OLLAMA_HOST: 0.0.0.0

volumes:
  ollama_data:
  home_dev:
